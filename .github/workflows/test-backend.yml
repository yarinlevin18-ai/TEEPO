name: Test (backend)

# Runs the backend pytest suite on every PR + push to master.
# Frontend has its own workflow (.github/workflows/test.yml — Vitest).
#
# Tests stub Supabase / Anthropic / Selenium so this runs offline,
# fast, and without leaking creds to CI logs.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: test-backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        # Selenium pulls in browser drivers we don't actually run in CI;
        # install the lot anyway so the test imports resolve cleanly.
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          # These have to exist for `from app import app` to succeed —
          # the conftest also sets them but env-level defaults are belt
          # and suspenders.
          FLASK_ENV: testing
          FLASK_SECRET_KEY: ci-test-secret
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-service-key
          SUPABASE_ANON_KEY: test-anon-key
          ANTHROPIC_API_KEY: test-anthropic-key
        run: pytest -v
