<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>TEEPO — Drive Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="pop-head">
    <div class="pop-brand" aria-hidden>
      <img src="icons/icon48.png" alt="" class="pop-icon" />
      <span class="pop-word">teepo</span>
    </div>
    <button class="pop-signout" data-action="signout" hidden>יציאה</button>
  </header>

  <!-- Anonymous: sign-in CTA -->
  <section class="pop-state" data-state="anon">
    <h1>סנכרון קבצים ל-Drive</h1>
    <p>התחברו עם אותו חשבון Google שאתם משתמשים בו ב-TEEPO.</p>
    <button class="pop-signin" data-action="signin">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" aria-hidden>
        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#fff" opacity=".85" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#fff" opacity=".7" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#fff" opacity=".55" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      התחברו עם Google
    </button>
  </section>

  <!-- Authed but no scannable content on this page -->
  <section class="pop-state" data-state="idle" hidden>
    <h1>אין קבצים בדף הזה</h1>
    <p>פתחו דף קורס ב-Moodle או בפורטל ולחצו על הסמל שוב.</p>
    <button class="pop-scan" data-action="scan">סרוק שוב</button>
  </section>

  <!-- Authed + content script found files -->
  <section class="pop-state" data-state="ready" hidden>
    <h1 class="pop-summary">
      <span data-bind="count">0</span>
      קבצים נמצאו בדף
    </h1>
    <p class="pop-source" data-bind="source">—</p>

    <div class="pop-course-picker" data-bind="course-picker">
      <label for="pop-course-select">לאיזה קורס לשייך?</label>
      <select id="pop-course-select" data-bind="course-select">
        <option value="">— בחר קורס —</option>
      </select>
      <small class="pop-course-hint" data-bind="course-hint" hidden></small>
    </div>

    <ul class="pop-file-list" data-bind="files"></ul>
    <div class="pop-actions">
      <button class="pop-secondary" data-action="select-all">בחר הכל</button>
      <button class="pop-primary" data-action="send">שלח ל-TEEPO</button>
    </div>
  </section>

  <!-- In-flight upload progress -->
  <section class="pop-state" data-state="uploading" hidden>
    <h1>מעלה ל-Drive...</h1>
    <div class="pop-progress" role="progressbar" aria-label="התקדמות">
      <div class="pop-progress-bar" data-bind="progress"></div>
    </div>
    <p class="pop-progress-text">
      <span data-bind="uploaded">0</span> מתוך <span data-bind="total">0</span>
    </p>
  </section>

  <!-- Final summary -->
  <section class="pop-state" data-state="done" hidden>
    <h1 class="pop-done">
      <span class="pop-check" aria-hidden>✓</span>
      הקבצים הועלו
    </h1>
    <p data-bind="done-text">—</p>
    <button class="pop-primary" data-action="open-teepo">פתח את המוח ב-TEEPO</button>
  </section>

  <!-- Error -->
  <section class="pop-state" data-state="error" hidden>
    <h1>משהו השתבש</h1>
    <p class="pop-err" data-bind="err">—</p>
    <button class="pop-secondary" data-action="retry">נסה שוב</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
