[pytest]
# Backend test config.
#
# Tests live under backend/tests/. They mock Supabase, Anthropic, Selenium,
# and any other external service so the suite is fast + offline.
#
# Run from the backend/ directory:
#   pytest                  # the whole suite
#   pytest -k health        # one subset by name
#   pytest -v               # verbose output
#
# CI runs these on every PR via .github/workflows/test-backend.yml.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Treat warnings as warnings, not errors. The Supabase + httpx ecosystem
# emits DeprecationWarnings we don't control; failing on them would block
# every PR for ecosystem churn.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Quiet the third-party noise; show ours.
log_cli = false
addopts = -ra --strict-markers
